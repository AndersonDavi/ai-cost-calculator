name: Update exchange rates

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC = 3am Colombia
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch rates
        run: |
          COP=$(curl -sf "https://api.frankfurter.dev/v2/rate/COP/USD" | jq 'if .rate > 0 then (1 / .rate | round) else error end')
          EUR=$(curl -sf "https://api.frankfurter.dev/v2/rate/EUR/USD" | jq '.rate')
          MXN=$(curl -sf "https://api.frankfurter.dev/v2/rate/MXN/USD" | jq 'if .rate > 0 then (1 / .rate * 100 | round / 100) else error end')
          DATE=$(date -u +%Y-%m-%d)
          echo "{\"copUsd\":$COP,\"eurUsd\":$EUR,\"mxnUsd\":$MXN,\"date\":\"$DATE\"}" > rates.json
          echo "Rates updated: COP=$COP EUR=$EUR MXN=$MXN"

      - name: Commit to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin data
          git checkout data
          git add rates.json
          git diff --staged --quiet || (git commit -m "chore: update exchange rates $(date -u +%Y-%m-%d)" && git push origin data)
